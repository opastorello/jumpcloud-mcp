services:
  jumpcloud-api:
    build: .
    ports:
      - '8020:8000'
    environment:
      - 'JUMPCLOUD_API_KEY=${JUMPCLOUD_API_KEY:-}'
      - 'JUMPCLOUD_ORG_ID=${JUMPCLOUD_ORG_ID:-}'
      - 'API_SECRET_TOKEN=${API_SECRET_TOKEN:-}'
      - 'MCP_SECRET_TOKEN=${MCP_SECRET_TOKEN:-}'
      - 'ALLOW_WRITE=${ALLOW_WRITE:-false}'
      - 'METRICS_ENABLED=${METRICS_ENABLED:-true}'
      - 'METRICS_COLLECT_INTERVAL=${METRICS_COLLECT_INTERVAL:-300}'
      - 'LOG_LEVEL=${LOG_LEVEL:-INFO}'
      - 'ENVIRONMENT=${ENVIRONMENT:-production}'
    volumes:
      - 'jumpcloud-logs:/app/logs'
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jumpcloud-api.rule=Host(`jumpcloud.pastorello-lab.com.br`)"
      - traefik.http.routers.jumpcloud-api.entrypoints=https
      - traefik.http.routers.jumpcloud-api.tls=true
      - traefik.http.routers.jumpcloud-api.tls.certresolver=letsencrypt
      - traefik.http.services.jumpcloud-api.loadbalancer.server.port=8000
    healthcheck:
      test:
        - CMD
        - python
        - '-c'
        - "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  jumpcloud-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - '8021:8002'
    environment:
      - 'JUMPCLOUD_API_KEY=${JUMPCLOUD_API_KEY:-}'
      - 'JUMPCLOUD_ORG_ID=${JUMPCLOUD_ORG_ID:-}'
      - 'API_SECRET_TOKEN=${API_SECRET_TOKEN:-}'
      - 'MCP_SECRET_TOKEN=${MCP_SECRET_TOKEN:-}'
      - 'ALLOW_WRITE=${ALLOW_WRITE:-false}'
      - 'MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}'
      - 'MCP_HOST=${MCP_HOST:-0.0.0.0}'
      - 'MCP_PORT=${MCP_PORT:-8002}'
      - 'LOG_LEVEL=${LOG_LEVEL:-INFO}'
      - 'ENVIRONMENT=${ENVIRONMENT:-production}'
    volumes:
      - 'jumpcloud-logs:/app/logs'
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jumpcloud-mcp.rule=Host(`jumpcloud-mcp.pastorello-lab.com.br`)"
      - traefik.http.routers.jumpcloud-mcp.entrypoints=https
      - traefik.http.routers.jumpcloud-mcp.tls=true
      - traefik.http.routers.jumpcloud-mcp.tls.certresolver=letsencrypt
      - traefik.http.services.jumpcloud-mcp.loadbalancer.server.port=8002
    depends_on:
      jumpcloud-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - '-c'
        - "import socket; s=socket.create_connection(('localhost',8002),2); s.close()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    entrypoint: /bin/sh
    command:
      - '-c'
      - "cat > /tmp/prometheus.yml <<EOF\nglobal:\n  scrape_interval: 300s\n  evaluation_interval: 300s\nalerting:\n  alertmanagers:\n    - static_configs:\n        - targets: ['alertmanager:9093']\nrule_files:\n  - /etc/prometheus/alerts.yml\n  - /etc/prometheus/recording-rules.yml\nscrape_configs:\n  - job_name: 'jumpcloud'\n    scheme: http\n    authorization:\n      type: Bearer\n      credentials: '$$API_SECRET_TOKEN'\n    static_configs:\n      - targets: ['jumpcloud-api:8000']\n    scrape_interval: 300s\n    scrape_timeout: 30s\nEOF\nexec /bin/prometheus \\\n  --config.file=/tmp/prometheus.yml \\\n  --storage.tsdb.path=/prometheus \\\n  --storage.tsdb.retention.time=90d \\\n  --web.enable-lifecycle \\\n  --web.external-url=https://jumpcloud.pastorello-lab.com.br/prometheus/ \\\n  --web.route-prefix=/prometheus\n"
    environment:
      - 'API_SECRET_TOKEN=${API_SECRET_TOKEN:-}'
    volumes:
      - 'prometheus-data:/prometheus'
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jumpcloud-prometheus.rule=Host(`jumpcloud.pastorello-lab.com.br`) && PathPrefix(`/prometheus`)"
      - traefik.http.routers.jumpcloud-prometheus.entrypoints=https
      - traefik.http.routers.jumpcloud-prometheus.tls=true
      - traefik.http.routers.jumpcloud-prometheus.tls.certresolver=letsencrypt
      - traefik.http.services.jumpcloud-prometheus.loadbalancer.server.port=9090
    depends_on:
      jumpcloud-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - '--spider'
        - '-q'
        - 'http://localhost:9090/-/healthy'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  alertmanager:
    build:
      context: .
      dockerfile: Dockerfile.alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - 'alertmanager-data:/alertmanager'
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - '--spider'
        - '-q'
        - 'http://localhost:9093/-/healthy'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  jumpcloud-logs: null
  prometheus-data: null
  alertmanager-data: null
